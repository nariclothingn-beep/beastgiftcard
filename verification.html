<!doctype html>
<html lang="hi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Human Verification -- Demo</title>
  <meta name="description" content="Human verification page with live AdBlueMedia offers.">
  <meta name="theme-color" content="#2fe6ff">
  <style>
    :root{--aqua:#2fe6ff;--white:#ffffff;--muted-dark:#0b2330;--badge-red:#ff2b2b;--black:#000000;--frame-w:360px}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:Inter, system-ui, Arial, sans-serif;background:linear-gradient(135deg,var(--aqua)0%,var(--aqua)40%,var(--white)40%,var(--white)60%,var(--aqua)60%,var(--aqua)100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;color:var(--muted-dark);-webkit-font-smoothing:antialiased}
    .frame{width:var(--frame-w);max-width:96%;background:rgba(255,255,255,0.03);border-radius:14px;padding:12px 14px 22px;box-shadow:0 10px 30px rgba(3,18,22,0.25);border:1px solid rgba(0,0,0,0.06);position:relative}
    .top-strip{display:flex;align-items:center;gap:12px;padding:10px;border-radius:10px;background:rgba(255,255,255,0.98);min-height:64px;overflow:hidden}
    .left-box{display:flex;flex-direction:column;gap:6px;align-items:flex-start;flex:0 0 auto}
    .live-row{display:flex;align-items:center;gap:8px}
    .live-label{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:10px;background:#fff;border:1px solid rgba(0,0,0,0.04);font-weight:900;color:var(--badge-red)}
    .live-dot{width:10px;height:10px;border-radius:50%;background:var(--badge-red);box-shadow:0 0 8px rgba(255,43,43,0.25)}
    .live-dot.blink{animation:blink 1000ms linear infinite}
    .online-small{font-size:12px;color:#0b2330;font-weight:700}
    .gift-small{font-size:13px;color:#07323a;background:linear-gradient(#fff,#f7fffe);padding:6px 8px;border-radius:6px;border:1px solid rgba(0,0,0,0.04);font-weight:700;display:inline-flex;align-items:center;gap:8px}
    .center-wrap{flex:1;min-width:0;display:flex;align-items:center;justify-content:center}
    .winners-scroller{display:flex;gap:8px;align-items:center;justify-content:flex-start;overflow-x:auto;padding:6px;min-width:0}
    .chip{display:inline-flex;align-items:center;gap:10px;border-radius:999px;padding:8px;border:1px solid rgba(0,0,0,0.06);background:#fff;min-width:0;max-width:320px;flex:0 0 auto}
    .chip.expanded{max-width:460px}
    .avatar{width:36px;height:36px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:800;background:linear-gradient(135deg,#f2f2f2,#e6fbff);color:#0b2330;flex:0 0 36px}
    .chip-content{display:flex;flex-direction:column;min-width:0}
    .chip-top{display:flex;gap:8px;align-items:center;min-width:0}
    .name{font-size:14px;font-weight:800;line-height:1.05;color:#07323a;overflow-wrap:break-word}
    .flag-badge{display:inline-flex;align-items:center;justify-content:center;font-size:13px;padding:4px 6px;border-radius:8px;background:#f0f7ff;border:1px solid rgba(0,0,0,0.04);flex:0 0 auto}
    .chip-bottom{display:flex;gap:8px;align-items:center;margin-top:4px}
    .chip-prize{color:var(--badge-red);font-weight:800}
    .chip-time{font-size:11px;color:#6b7280}
    .right-box{flex:0 0 0px}
    .title{font-size:26px;font-weight:900;color:var(--muted-dark);text-transform:uppercase;letter-spacing:1px;text-align:center;margin-top:8px}
    .desc{margin:10px 6px 12px;text-align:center;color:var(--muted-dark);font-size:15px}
    .offers{display:flex;flex-direction:column;gap:14px;margin-top:2px}
    .offer{background:var(--white);color:var(--muted-dark);border-radius:40px;padding:14px;text-align:center;font-weight:800;font-size:15px;box-shadow:0 10px 24px rgba(2,18,30,0.12);border:1px solid rgba(0,0,0,0.06);cursor:pointer;transition:transform 0.15s, box-shadow 0.15s}
    .offer:hover{transform:translateY(-2px);box-shadow:0 14px 28px rgba(2,18,30,0.18)}
    .offer:active{transform:translateY(0)}
    .offer .offer-desc{font-size:12px;font-weight:500;color:#6b7280;margin-top:4px}
    .offer .offer-payout{color:var(--badge-red);font-size:13px;font-weight:700;margin-top:3px}
    .timer-box{display:flex;justify-content:center;margin-top:18px}
    .timer{background:var(--black);color:#fff;padding:12px 22px;border-radius:10px;font-weight:900;font-size:18px;box-shadow:0 12px 28px rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.06)}
    .loading-text{text-align:center;padding:20px;color:#6b7280;font-size:14px}
    .lead-status{position:fixed;top:10px;right:10px;background:#fff;padding:10px 14px;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,0.15);font-size:13px;font-weight:700;z-index:9999;display:none;max-width:280px}
    .lead-status.show{display:block}
    .lead-status.success{color:#16a34a;border-left:4px solid #16a34a}
    .lead-status.pending{color:#ca8a04;border-left:4px solid #ca8a04}
    footer{margin-top:16px;text-align:center;color:rgba(11,35,48,0.8);font-size:12px}
    @media (prefers-reduced-motion: reduce){ .live-dot{animation:none !important} }
    @keyframes blink{0%{opacity:1}50%{opacity:0.15}100%{opacity:1}}
    .sr-only{position:absolute !important;height:1px;width:1px;overflow:hidden;clip:rect(1px,1px,1px,1px);white-space:nowrap;border:0;padding:0;margin:-1px}
    @media(max-width:420px){:root{--frame-w:95%}.frame{width:95%}.chip{max-width:260px}}
  </style>
</head>
<body>
  <div class="frame" role="main">
    <div class="top-strip" aria-live="polite">
      <div class="left-box">
        <div class="live-row">
          <div class="live-label" aria-hidden="false">
            <span id="liveDot" class="live-dot blink" aria-hidden="true"></span>
            <span class="live-text">LIVE</span>
          </div>
          <div id="onlineSmall" class="online-small" aria-hidden="false">... online</div>
        </div>
        <div id="giftSmall" class="gift-small">
          <span id="giftLiveText">Loading...</span>
        </div>
      </div>
      <div class="center-wrap">
        <div class="winners-scroller" id="winners" role="list" aria-label="Recent winners">
          <!-- chips injected here -->
        </div>
      </div>
      <div class="right-box" aria-hidden="true"></div>
    </div>

    <div class="banner" id="headerBanner">
      <div id="pageTitle" class="title">HUMAN VERIFICATION</div>
    </div>

    <div class="desc">Complete <strong>'Any One'</strong> of the offers below to prove that you are not a BOT.</div>

    <!-- AdBlueMedia API Offers Container -->
    <div class="offers" id="offers" role="list">
      <div class="loading-text" id="offersLoading">Loading offers...</div>
    </div>

    <div class="timer-box">
      <div class="timer" id="timer" role="status" aria-live="polite">05:00</div>
    </div>

    <footer>Powered by AdBlueMedia API</footer>
  </div>

  <!-- Lead Status Notification -->
  <div id="leadStatus" class="lead-status">
    <div id="leadStatusText">Checking leads...</div>
  </div>

  <noscript>
    <div style="position:fixed;left:0;right:0;bottom:0;background:#fff;padding:10px;text-align:center;border-top:1px solid #eee;">JavaScript disabled -- page ka kuch hissa sahi se kaam nahi karega.</div>
  </noscript>

  <div id="srAnnounce" class="sr-only" aria-live="polite"></div>

  <script>
  'use strict';
  (function(){
    // ==================== CONFIG ====================
    const ADBLUEMEDIA_CONFIG = {
      user_id: '790910',
      api_key: '6b39c9c694191d9cbc9153509bce006b',
      feed_url: 'https://de6jvomfbm0af.cloudfront.net/public/offers/feed.php',
      check_url: 'https://de6jvomfbm0af.cloudfront.net/public/external/check2.php',
      num_offers: 10, // Max 10
      s1: '',
      s2: ''
    };

    // ==================== GIFT / WINNERS LOGIC ====================
    const giftTypes = ['Amazon','Google Play','Steam','Xbox','Roblox','Spotify','iTunes','Fortnite'];
    const amounts = [50,75,100,150,200];
    const firstNames = [
      'Liam','Olivia','Noah','Emma','Oliver','Ava','William','Sophia','James','Isabella',
      'Benjamin','Mia','Lucas','Charlotte','Henry','Amelia','Santiago','SofĂ­a','Mateo','Valentina',
      'Diego','Camila','SebastiĂˇn','LucĂ­a','Aisha','Kwame','Fatima','Chinonso','Nia','Abdul','Zuri','Kofi',
      'Omar','Lina','Hanan','Youssef','Leila','Hassan','Mariam','Ali','Hiro','Yuna','Min','Soo','Wei','Yuki','Jin','Sora',
      'Kai','Zoe','Ethan','Aarav','Isha','Zara','Rohan','Ananya','Ishaan','Alex','Taylor','Jordan','Casey','Riley','Quinn','Morgan','Rowan'
    ];
    const lastSurnames = ['Smith','Garcia','Ng','Chen','Khan','Silva','Rossi','Martin','Kim','Ivanov','Brown','Lopez','Dubois','Park','Johnson','MĂĽller','Singh','Alvarez','Okafor','HernĂˇndez','Nakamura','Owen','Diaz','Costa','Petrov'];
    const lastInitials = ['S.','G.','L.','C.','K.','P.','R.','M.','N.','I.','B.','D.','T.','O.','V.','H.','Y.','Z.'];
    const flags = ['đź‡şđź‡¸','đź‡¬đź‡§','đź‡¨đź‡¦','đź‡¦đź‡ş','đź‡®đź‡ł','đź‡®đź‡ą','đź‡Şđź‡¸','đź‡«đź‡·','đź‡©đź‡Ş','đź‡§đź‡·','đź‡¦đź‡Ş','đź‡żđź‡¦','đź‡¸đź‡¬','đź‡Żđź‡µ','đź‡°đź‡·','đź‡˛đź‡˝','đź‡łđź‡±','đź‡µđź‡­','đź‡ąđź‡·','đź‡®đź‡±'];

    const winnersEl = document.getElementById('winners');
    const onlineSmall = document.getElementById('onlineSmall');
    const giftLiveText = document.getElementById('giftLiveText');
    const liveDot = document.getElementById('liveDot');
    const srAnn = document.getElementById('srAnnounce');

    const recent = [];
    const MAX_CHIPS = 6;
    const NO_REPEAT_WINDOW = 25;

    function rndInt(max){ return Math.floor(Math.random()*max); }
    function rnd(arr){ return arr[rndInt(arr.length)]; }
    function initials(name){ return name.split(' ').slice(0,2).map(s=>s.charAt(0).toUpperCase()).join(''); }

    function pickGift(){
      const type = rnd(giftTypes);
      const amt = rnd(amounts);
      return `$${amt} ${type}`;
    }

    function generateUniqueName(){
      const avoid = new Set(recent.slice(0,NO_REPEAT_WINDOW).map(r=>r.name));
      for(let attempt=0; attempt<20; attempt++){
        const first = rnd(firstNames);
        if(Math.random() < 0.55){
          const last = rnd(lastSurnames);
          const candidate = `${first} ${last}`;
          if(!avoid.has(candidate)) return candidate;
        } else {
          const lastI = rnd(lastInitials);
          const candidate = `${first} ${lastI}`;
          if(!avoid.has(candidate)) return candidate;
        }
      }
      const fallbackFirst = rnd(firstNames);
      const fallbackLast = rnd(lastSurnames);
      const suffix = Math.floor(100 + Math.random()*900);
      return `${fallbackFirst} ${fallbackLast}${suffix}`;
    }

    function makeWinner(){
      const name = generateUniqueName();
      const prize = pickGift();
      const flag = rnd(flags);
      return { name, prize, flag, time: new Date() };
    }

    function formatTime(d){
      const h = d.getHours(), m = d.getMinutes();
      return (h<10?'0':'')+h+':'+(m<10?'0':'')+m;
    }

    function render(){
      winnersEl.innerHTML = '';
      recent.slice(0,MAX_CHIPS).forEach(w => {
        const chip = document.createElement('div'); chip.className='chip'; chip.setAttribute('role','listitem');
        chip.title = `${w.name} -- ${w.prize} ${w.flag} (${formatTime(w.time)})`;

        const av = document.createElement('div'); av.className='avatar'; av.textContent = initials(w.name);

        const content = document.createElement('div'); content.className='chip-content';
        const top = document.createElement('div'); top.className='chip-top';
        const name = document.createElement('div'); name.className='name'; name.textContent = w.name;
        const flag = document.createElement('div'); flag.className='flag-badge'; flag.textContent = w.flag;
        top.appendChild(name); top.appendChild(flag);

        const bottom = document.createElement('div'); bottom.className='chip-bottom';
        const prize = document.createElement('div'); prize.className='chip-prize'; prize.textContent = w.prize;
        const time = document.createElement('div'); time.className='chip-time'; time.textContent = formatTime(w.time);
        bottom.appendChild(prize); bottom.appendChild(time);

        content.appendChild(top); content.appendChild(bottom);
        chip.appendChild(av); chip.appendChild(content);

        chip.addEventListener('click', ()=>{ const open = chip.classList.contains('expanded'); document.querySelectorAll('.chip.expanded').forEach(c=>c.classList.remove('expanded')); if(!open) chip.classList.add('expanded'); });

        winnersEl.appendChild(chip);
      });
    }

    function addWinner(w){
      recent.unshift(w);
      if(recent.length>500) recent.pop();
      render();
      if(srAnn) srAnn.textContent = `${w.name} won ${w.prize}`;
    }

    for(let i=0;i<8;i++){
      const w = makeWinner();
      w.time = new Date(Date.now() - (i+1)*45000);
      addWinner(w);
    }

    if(recent.length>0 && giftLiveText){
      giftLiveText.textContent = `${recent[0].name} -- ${recent[0].prize}`;
    }

    setInterval(()=>{
      const w = makeWinner();
      addWinner(w);
      if(giftLiveText) giftLiveText.textContent = `${w.name} -- ${w.prize}`;
    }, 3500);

    // ==================== SMOOTH ONLINE COUNT ====================
    let onlineCount = 900 + Math.floor(Math.random() * 800);
    if(onlineSmall) onlineSmall.textContent = onlineCount.toLocaleString('en-IN') + ' online';

    function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

    function updateOnlineSmooth(){
      const pct = 0.02 + Math.random()*0.03;
      let maxStep = Math.round(onlineCount * pct);
      if(maxStep < 6) maxStep = 6;
      if(maxStep > 60) maxStep = 60;
      const delta = Math.floor((Math.random() * (maxStep*2 + 1)) - maxStep);
      let spike = 0;
      if(Math.random() < 0.04){
        spike = (Math.random() < 0.5 ? -1 : 1) * (20 + Math.floor(Math.random()*80));
      }
      let next = onlineCount + delta + spike;
      next = clamp(next, 500, 3000);
      const smooth = Math.round(onlineCount * 0.6 + next * 0.4);
      onlineCount = clamp(smooth, 500, 3000);
      if(onlineSmall) onlineSmall.textContent = onlineCount.toLocaleString('en-IN') + ' online';
      const nextInterval = 8000 + Math.floor(Math.random() * 6000);
      setTimeout(updateOnlineSmooth, nextInterval);
    }
    setTimeout(updateOnlineSmooth, 9000);
    window._demoOnline = { get(){ return onlineCount; } };

    // ==================== BLINK HANDLING ====================
    const media = window.matchMedia('(prefers-reduced-motion: reduce)');
    function updateBlink(){
      if(!liveDot) return;
      if(media.matches){
        liveDot.classList.remove('blink');
        liveDot.style.animation='none';
      } else {
        liveDot.classList.add('blink');
        liveDot.style.animation='blink 1000ms linear infinite';
      }
    }
    updateBlink();
    if(media.addEventListener) media.addEventListener('change', updateBlink);

    // ==================== ADBLUE MEDIA API - FETCH OFFERS ====================
    function loadOffers() {
      const offersContainer = document.getElementById('offers');
      const loadingEl = document.getElementById('offersLoading');
      
      const url = ADBLUEMEDIA_CONFIG.feed_url + 
        '?user_id=' + encodeURIComponent(ADBLUEMEDIA_CONFIG.user_id) +
        '&api_key=' + encodeURIComponent(ADBLUEMEDIA_CONFIG.api_key) +
        '&s1=' + encodeURIComponent(ADBLUEMEDIA_CONFIG.s1) +
        '&s2=' + encodeURIComponent(ADBLUEMEDIA_CONFIG.s2) +
        '&callback=?';

      // Create script tag for JSONP
      const script = document.createElement('script');
      script.src = url;
      
      // JSONP callback function
      window.adbOffersCallback = function(offers) {
        if (loadingEl) loadingEl.style.display = 'none';
        
        if (!offers || !Array.isArray(offers) || offers.length === 0) {
          offersContainer.innerHTML = '<div class="loading-text">No offers available at the moment. Please refresh.</div>';
          return;
        }

        // Trim to num_offers (max 10)
        offers = offers.slice(0, ADBLUEMEDIA_CONFIG.num_offers);
        
        offersContainer.innerHTML = '';
        
        offers.forEach(function(offer, index) {
          const btn = document.createElement('button');
          btn.className = 'offer';
          btn.setAttribute('role', 'listitem');
          btn.setAttribute('data-offer-id', offer.offer_id || '');
          
          // Main anchor text
          const anchorText = document.createElement('div');
          anchorText.textContent = offer.anchor || 'Complete This Offer';
          
          // Description if available
          if (offer.conversion) {
            const desc = document.createElement('div');
            desc.className = 'offer-desc';
            desc.textContent = offer.conversion;
            anchorText.appendChild(desc);
          }
          
          // Payout info
          if (offer.points) {
            const payout = document.createElement('div');
            payout.className = 'offer-payout';
            const dollars = (parseFloat(offer.points) / 100).toFixed(2);
            payout.textContent = 'Earn $' + dollars;
            anchorText.appendChild(payout);
          }
          
          btn.appendChild(anchorText);
          
          // Click handler - opens offer URL
          btn.addEventListener('click', function() {
            const offerUrl = offer.url || '';
            if (offerUrl && offerUrl.indexOf('http') === 0) {
              try {
                const win = window.open(offerUrl, '_blank', 'noopener');
                if (win) win.opener = null;
              } catch(e) {
                console.warn('Could not open offer link', e);
              }
            } else {
              console.warn('Invalid offer URL');
            }
          });
          
          offersContainer.appendChild(btn);
        });
        
        console.log('AdBlueMedia offers loaded:', offers.length);
      };

      // Error handling
      script.onerror = function() {
        if (loadingEl) loadingEl.style.display = 'none';
        offersContainer.innerHTML = '<div class="loading-text">Failed to load offers. Please refresh the page.</div>';
        console.error('Failed to load AdBlueMedia offers');
      };

      document.head.appendChild(script);
    }

    // Load offers on page load
    loadOffers();

    // ==================== REAL LEAD CHECKING ====================
    const leadStatusEl = document.getElementById('leadStatus');
    const leadStatusTextEl = document.getElementById('leadStatusText');
    let totalEarnings = 0;
    let completedOffers = [];
    let checkCount = 0;

    function showLeadStatus(message, type) {
      if (!leadStatusEl || !leadStatusTextEl) return;
      leadStatusTextEl.textContent = message;
      leadStatusEl.className = 'lead-status show ' + (type || 'pending');
      setTimeout(function() {
        leadStatusEl.classList.remove('show');
      }, 5000);
    }

    function checkLeads() {
      checkCount++;
      console.log('Checking leads... Attempt #' + checkCount);
      
      const url = ADBLUEMEDIA_CONFIG.check_url + '?testing=0&callback=?';
      
      const script = document.createElement('script');
      script.src = url;
      
      window.adbLeadsCallback = function(leads) {
        if (!leads || !Array.isArray(leads)) {
          console.log('No leads data received');
          return;
        }
        
        const completed_leads = leads.length;
        
        if (completed_leads > 0) {
          var offer_ids = [];
          var earnings_in_cents = 0;
          
          leads.forEach(function(lead) {
            offer_ids.push(parseInt(lead.offer_id));
            earnings_in_cents += parseFloat(lead.points);
            console.log('Single lead on offer id ' + lead.offer_id + ' for $' + (parseFloat(lead.points) / 100).toFixed(2));
          });
          
          totalEarnings = earnings_in_cents;
          completedOffers = offer_ids;
          
          var totalDollars = (earnings_in_cents / 100).toFixed(2);
          
          console.log('SUMMARY: User has completed ' + completed_leads + ' leads, for $' + totalDollars + ' earnings, on offer ids: ' + offer_ids.join(','));
          
          showLeadStatus(
            'Lead completed! $' + totalDollars + ' earned (' + completed_leads + ' offer' + (completed_leads > 1 ? 's' : '') + ')',
            'success'
          );
          
          // You can add redirect or unlock logic here
          // window.location.href = 'https://your-success-page.com';
          
        } else {
          console.log('No leads were found (check #' + checkCount + ')');
        }
      };
      
      script.onerror = function() {
        console.error('Failed to check leads');
      };
      
      document.head.appendChild(script);
      
      // Clean up old scripts to prevent memory buildup
      setTimeout(function() {
        if (script.parentNode) script.parentNode.removeChild(script);
      }, 5000);
    }

    // Start checking leads every 15 seconds
    setInterval(checkLeads, 15000);
    
    // First check after 3 seconds
    setTimeout(checkLeads, 3000);

    // ==================== TIMER ====================
    (function(){
      const timerEl=document.getElementById('timer'); if(!timerEl) return;
      let end=Date.now()+5*60*1000;
      const tick=setInterval(()=>{
        const diff=end-Date.now();
        if(diff<=0){ timerEl.textContent='00:00'; clearInterval(tick); return; }
        const m=Math.floor(diff/60000); const s=Math.floor((diff%60000)/1000);
        timerEl.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
      },250);
    })();

    // ensure blink keyframes present
    (function(){ const s=document.createElement('style'); s.textContent='@keyframes blink{0%{opacity:1}50%{opacity:0.15}100%{opacity:1}}'; document.head.appendChild(s); })();

    window._demoRecentWinners = { recent, addWinner, generateUniqueName: generateUniqueName };

  })();
  </script>
</body>
</html>
